<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>arr-mcp — Setup</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .signin-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      gap: 2rem;
    }
    .signin-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 380px;
      width: 100%;
    }
    .signin-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .75rem;
      margin-bottom: 1.5rem;
    }
    .signin-logo .logo-img { height: 40px; }
    .signin-logo .logo { font-size: 1.6rem; font-weight: 700; }
    .signin-tagline {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 2rem;
    }
    .btn-plex {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      background: #e5a00d;
      color: #000;
      font-weight: 700;
      font-size: 1rem;
      padding: .75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      transition: background .15s;
      border: none;
      cursor: pointer;
    }
    .btn-plex:hover { background: #f0b429; }
    .btn-plex svg { width: 20px; height: 20px; fill: #000; }
    .signin-error {
      background: rgba(231,76,60,.15);
      border: 1px solid rgba(231,76,60,.4);
      border-radius: 6px;
      color: #e74c3c;
      padding: .75rem 1rem;
      font-size: .875rem;
      margin-bottom: 1.5rem;
    }
    .signin-divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin: 1.5rem 0;
      color: var(--muted);
      font-size: .8rem;
    }
    .signin-divider::before,
    .signin-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .local-login-form {
      display: flex;
      flex-direction: column;
      gap: .75rem;
      text-align: left;
    }
    .local-login-form label {
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: .25rem;
      display: block;
    }
    .local-login-form input {
      width: 100%;
      padding: .6rem .75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: inherit;
      font-size: .9rem;
      box-sizing: border-box;
    }
    .btn-local {
      width: 100%;
      padding: .65rem 1rem;
      border-radius: 8px;
      border: none;
      background: var(--accent, #4a9eff);
      color: #000;
      font-weight: 700;
      font-size: .9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="signin-wrap">
    <div class="signin-card">
      <div class="signin-logo">
        <img class="logo-img" src="/static/logo.svg" alt="arr-mcp logo">
        <span class="logo">arr-mcp</span>
      </div>
      <p class="signin-tagline">Welcome — create the first admin account to get started.</p>

      {% if error %}
      <div class="signin-error">{{ error }}</div>
      {% endif %}

      <form class="local-login-form" method="post" action="/auth/setup">
        <div>
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required>
        </div>
        <div>
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required>
        </div>
        <div>
          <label for="confirm_password">Confirm password</label>
          <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" minlength="8" required>
        </div>
        <button type="submit" class="btn-local">Create admin account</button>
      </form>

      <div class="signin-divider">or</div>

      <a href="/auth/plex/start" class="btn-plex">
        <!-- Plex "P" logo mark -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M11.994 2L4 12.005 11.994 22l8.004-9.995L11.994 2z"/>
        </svg>
        Sign in with Plex
      </a>
    </div>
  </div>
</body>
</html>
