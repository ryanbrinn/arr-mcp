site_name: arr-mcp
site_description: MCP server for natural language management of a home media server stack
site_url: https://ryanbrinn.github.io/arr-mcp
repo_url: https://github.com/ryanbrinn/arr-mcp
repo_name: ryanbrinn/arr-mcp

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: false
    code: false
  palette:
    - scheme: slate
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Roadmap: roadmap.md
  - Getting Started: getting-started.md
  - Contributing: contributing.md
  - Configuration: configuration.md
  - Tools Reference: tools.md
  - Architecture: architecture.md
  - Security: security.md
  - Lessons Learned: lessons-learned.md
  - Architecture Decisions:
    - Overview: adr/index.md
    - "ADR-0001: Filesystem Ownership Scoping": adr/0001-filesystem-ownership-scoping.md
    - "ADR-0002: Host-Side Helper Agent": adr/0002-host-side-helper-agent.md
    - "ADR-0003: Frontend Strategy": adr/0003-frontend-strategy.md
    - "ADR-0004: Supported Runtime Configurations": adr/0004-supported-runtime-configurations.md
    - "ADR-0005: AI Provider Strategy": adr/0005-ai-provider-strategy.md
    - "ADR-0006: User Interest Model": adr/0006-user-interest-model.md
    - "ADR-0007: Shared Service Layer": adr/0007-shared-service-layer.md
    - "ADR-0008: Authentication Strategy": adr/0008-authentication-strategy.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
