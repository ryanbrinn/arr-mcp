site_name: arr-mcp
site_description: MCP server for natural language management of a home media server stack
site_url: https://ryanbrinn.github.io/arr-mcp
repo_url: https://github.com/ryanbrinn/arr-mcp
repo_name: ryanbrinn/arr-mcp

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Roadmap: roadmap.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Tools Reference: tools.md
  - Architecture: architecture.md
  - Security: security.md
  - Architecture Decisions:
    - Overview: adr/index.md
    - "ADR-0001: Filesystem Ownership Scoping": adr/0001-filesystem-ownership-scoping.md
    - "ADR-0002: Host-Side Helper Agent": adr/0002-host-side-helper-agent.md
    - "ADR-0003: Frontend Strategy": adr/0003-frontend-strategy.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
